<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart — Velmora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar scrolled" id="navbar">
    <div class="nav-inner">
      <a href="/" class="nav-logo">VELMORA</a>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/shop/">Shop</a></li>
      </ul>
      <div class="nav-actions">
        <a href="/cart/" class="icon-btn cart-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <span class="cart-count" id="cartCount">0</span>
        </a>
      </div>
    </div>
  </nav>

  <!-- CART PAGE -->
  <section class="cart-page">
    <div class="container">
      <h1 class="cart-title">Your Cart</h1>
      <div class="cart-grid" id="cartContainer">
        <!-- Injected by JS -->
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>© 2024 Velmora. All rights reserved.</p>
        <a href="/shop/" style="color:var(--gold);font-size:0.75rem;letter-spacing:0.1em;">← Continue Shopping</a>
      </div>
    </div>
  </footer>

  <script src="/js/data.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/cartpage.js"></script>
</body>
</html>
