<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product — Velmora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar scrolled" id="navbar">
    <div class="nav-inner">
      <a href="/" class="nav-logo">VELMORA</a>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/shop/">Shop</a></li>
        <li><a href="index.html#about">Our Story</a></li>
        <li><a href="index.html#contact">Contact</a></li>
      </ul>
      <div class="nav-actions">
        <a href="/cart/" class="icon-btn cart-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <span class="cart-count" id="cartCount">0</span>
        </a>
        <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
      </div>
    </div>
  </nav>
  <div class="mobile-menu" id="mobileMenu">
    <ul>
      <li><a href="/">Home</a></li>
      <li><a href="shop/">Shop</a></li>
    </ul>
  </div>

  <!-- BREADCRUMB -->
  <div style="padding:7rem 0 0; background:var(--black);">
    <div class="container">
      <p style="font-size:0.65rem;letter-spacing:0.12em;color:var(--text-dim);">
        <a href="/" style="color:var(--text-dim);transition:color 0.2s;" onmouseover="this.style.color='var(--gold)'" onmouseout="this.style.color='var(--text-dim)'">Home</a>
        &nbsp;/&nbsp;
        <a href="shop/" style="color:var(--text-dim);transition:color 0.2s;" onmouseover="this.style.color='var(--gold)'" onmouseout="this.style.color='var(--text-dim)'">Shop</a>
        &nbsp;/&nbsp;
        <span id="breadcrumbName" style="color:var(--text-muted);">Product</span>
      </p>
    </div>
  </div>

  <!-- PRODUCT DETAIL -->
  <section class="product-page">
    <div class="container">
      <div class="product-page-grid" id="productPageGrid">
        <!-- Injected by JS -->
        <div style="text-align:center;padding:5rem;grid-column:1/-1;color:var(--text-muted);">Loading...</div>
      </div>
    </div>
  </section>

  <!-- RELATED PRODUCTS -->
  <section class="section" style="background:var(--black-soft);">
    <div class="container">
      <div class="section-header">
        <p class="section-eyebrow">You May Also Like</p>
        <h2 class="section-title">Related Fragrances</h2>
        <div class="gold-divider"></div>
      </div>
      <div class="product-grid" id="relatedGrid"></div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>© 2024 Velmora. All rights reserved.</p>
        <a href="shop/" style="color:var(--gold);font-size:0.75rem;letter-spacing:0.1em;">← Back to Shop</a>
      </div>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/main.js"></script>
  <script src="js/product.js"></script>
</body>
</html>
